version: "3.8"
services:
  db:
    image: postgres
    container_name: postgres
    restart: always
    volumes:
      - ./db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - 5000:5432
  adminer:
    image: adminer
    restart: always
    ports:
      - 5601:8080
